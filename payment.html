<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Payment Gateway</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body {
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .payment-card {
            background: #fff;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            overflow: hidden;
            padding-bottom: 25px;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            padding: 25px;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .qr-section {
            padding: 25px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .qr-container {
            width: 200px;
            height: 200px;
            overflow: hidden;
            border-radius: 15px;
            border: 4px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            margin-bottom: 15px;
        }

        .qr-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .instruction {
            font-size: 0.9rem;
            color: #666;
        }

        .form-section {
            padding: 10px 30px 0;
            text-align: left;
        }

        .input-group { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 7px;
            color: #444;
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #eee;
            border-radius: 10px;
            font-size: 1rem;
            background: #fdfdfd;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }

        /* MODAL WITHOUT STICKER */
        #vip-popup {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .popup-content {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 300px;
            animation: fadeIn 0.3s ease-out;
        }

        .popup-content h3 {
            color: #1a73e8;
            margin-bottom: 8px;
            font-size: 1.3rem;
        }

        .popup-content p {
            color: #444;
            font-size: 0.95rem;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .footer-note {
            font-size: 0.75rem;
            color: #bbb;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
<script>
const user = localStorage.getItem("user");

if (!user || user === "null") {
    window.location.href = "index.html";
}
</script>
    <div class="payment-card">
        <div class="header">Secure Payment</div>
        
        <div class="qr-section">
            <div class="qr-container">
                <img id="qrImage" src="" alt="QR" class="qr-image">
            </div>
            <p class="instruction">Scan QR to pay with any UPI App.</p>
        </div>

        <form class="form-section" id="payForm">
            <div class="input-group">
                <label>UTR / Transaction ID</label>
                <input type="text" id="utr" placeholder="12 Digit UTR Number" required>
            </div>

            <div class="input-group">
                <label>Payment Screenshot</label>
                <input type="file" id="screenshot" accept="image/*" required>
            </div>

            <button type="submit" class="submit-btn">Submit Payment</button>
            <p class="footer-note">Verification takes only 10 minutes.</p>
        </form>

        <div id="vip-popup">
            <div class="popup-content">
                <h3>Submitted!</h3>
                <p>Deposit received. Verification will be completed in 10 minutes.</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('payForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const popup = document.getElementById('vip-popup');
            popup.style.display = 'flex';

            setTimeout(() => {
                popup.style.display = 'none';
                document.getElementById('payForm').reset();
            }, 3000);
        });
    </script>
<script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCRocodkDhKanc-9hTI2xpzfihlh29udio",
  authDomain: "trusted-usdt-seller.firebaseapp.com",
  projectId: "trusted-usdt-seller"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 QR AUTO LOAD
db.collection("settings").doc("payment")
.onSnapshot(doc => {
    if(doc.exists){
        document.getElementById("qrImage").src = doc.data().qr;
    }
});
</script>
</body>
</html>
